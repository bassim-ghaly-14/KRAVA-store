<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KRAVA — Cart</title>
  <link rel="stylesheet" href="css/master.css" />
  <style>
    /* إضافات CSS للـ Cart والـ Modal */
    .cart-page{ padding: 2rem 0; }
    .cart-items{ display:flex; flex-direction:column; gap:1rem; margin-bottom:1.5rem; text-align: center; }
    .cart-items p span{color: var(--muted);}
    .cart-item{
      display:flex; align-items:center; justify-content:space-between;
      border:1px solid var(--glass); border-radius:12px; padding:10px;
      background:var(--card-bg); transition:0.2s;
    }
    .cart-item:hover{ box-shadow:0 5px 15px rgba(0,0,0,0.2); }
    .cart-item img{ width:80px; height:80px; object-fit:cover; border-radius:8px; }
    .cart-item-details{ flex:1; margin-left:10px; }
    .cart-item-title{ font-weight:600; margin-bottom:5px; }
    .cart-item-price{ color:var(--brand-red); font-weight:700; }
    .cart-item-qty{ display:flex; align-items:center; gap:5px; margin-top:8px; }
    .cart-item-qty button{
      width:28px; height:28px; border:none; background:var(--surface-2); border-radius:6px; cursor:pointer;
      transition:0.1s;
    }
    .cart-item-qty button:hover{ background:var(--glass); }
    .cart-actions{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-top:1.5rem; }
    .cartpng{
      width: 200px;
      display: block;
      margin: 0 auto;
    }
    .shopping{
      display: block;
      margin: 0 auto;
    }
    /* Modal */
    .modal-bg{
      position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5);
      display:none; justify-content:center; align-items:center; z-index:100;
    }
    .modal{
      background: var(--card-bg); padding:20px; border-radius:12px; max-width:400px; width:90%;
      text-align:center; position:relative;
    }
    .modal h2{ margin-top:0; color: var(--brand-red); }
    .modal button{ margin-top:15px; }
    .modal .close{
      position:absolute; top:10px; right:10px; background:none; border:none; font-size:20px; cursor:pointer;
    }
  </style>
</head>
<body>

<!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="images/logo/k.PNG" alt="KRAVA Logo" class="brand-logo" />
      </a>
      <!-- icons -->
      <div class="options">
        <div class="header-actions">
          <button id="themeToggle" class="theme-toggle" aria-pressed="false" title="تبديل وضع الضوء / الداكن">
            🌙
          </button>
        </div>
      </div>
    </div>
  </header>

<main class="cart-page container" style="min-height: 75vh;">
  <h1>Cart</h1>

  <div id="cartItems" class="cart-items">
  </div>

  <div class="cart-actions">
    <button id="clearCart" class="btn btn-outline">Empty Cart</button>
    <div class="total-price">
      <strong>
      Total: <span id="cartTotal">0</span> EGP
      </strong>
    </div>
    <button id="checkout" class="btn btn-primary">Checkout Now</button>
  </div>
</main>

<!-- Modal Checkout -->
<div id="checkoutModal" class="modal-bg">
  <div class="modal">
    <button class="close btn-outline" id="closeModal">&times;</button>
    <h2>Confirm Your Order</h2>
    <p id="modalContent"></p>
    <button id="confirmPurchase" class="btn btn-primary">Confirm Purchase</button>
  </div>
</div>

<!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year">2025</span><span id="logo"> KRAVA</span> — All Rights Reserved.</p>
    </div>
  </footer>

<script src="js/cart.js"></script>
<script src="js/script.js"></script>
</body>
</html>
